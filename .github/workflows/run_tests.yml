name: Run unit tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  run_tests:
    name: Run tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        sharpmake-framework: [net8.0]
        tests-configuration: [Release, Debug]
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4.2.2
        with:
          submodules: true
      
      - name: Generate tests-solution using Sharpmake
        shell: pwsh
        run: |
          ./tools/Generate-Sharpmake.ps1 -TagName 1.3.0 -Params "/sources('./tests/sharpmake.cs')"

      - name: Add msbuild to PATH - Windows
        if: runner.os == 'Windows'
        uses: microsoft/setup-msbuild@v2

      - name: Build generated solutions - Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $slnlist = Get-ChildItem "./build/" -Filter "*.sln"
          foreach ($sln in $slnlist) {
            msbuild -t:rebuild -restore $sln.FullName /verbosity:normal /p:Configuration=Release /maxcpucount
          }

      - name: Execute built executables - Windows
        shell: pwsh
        run: |
          $exelist = Get-ChildItem "./generated/output" -Filter "*.exe" -Recurse
          foreach ($exe in $exelist) {
            & $exe.FullName
          }